<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA Keypair Generator — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🔑</span>
                <div class="title-col">
                    <h1>RSA Keypair Generator</h1>
                    <p class="tagline">Generate public and private keys with options for bit size ranges.</p>
                </div>
            </div>
            <div class="badge">security</div>
        </header>

        <main class="workspace-card">
            
            <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px;">
                <label>Key Bit Size:</label>
                <select id="rsa-bits" style="background: var(--bg-secondary); color:#fff; border: 1px solid var(--border); padding: 8px; border-radius: 8px;">
                    <option value="1024">1024-bit (Fast)</option>
                    <option value="2048" selected>2048-bit (Standard)</option>
                </select>
                <button class="btn" onclick="genKeys()">Generate Keypair</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label>Public Key (PEM)</label>
                    <textarea id="rsa-pub" readonly></textarea>
                </div>
                <div>
                    <label>Private Key (PEM)</label>
                    <textarea id="rsa-priv" readonly></textarea>
                </div>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
